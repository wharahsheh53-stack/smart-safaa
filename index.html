<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- تعريفات التطبيق للجوال PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#87CEEB">
    <title>صفاء - SAFAA</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #f0f7f9; 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; /* لمنع التمرير غير الضروري في وضع التطبيق */
        }
        .safaa-gradient { background: linear-gradient(135deg, #87CEEB 0%, #98FF98 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; }
        
        /* حركة النبض لحالة الخطر */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .emergency-pulse { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <!-- واجهة التطبيق الرئيسية -->
    <div id="app" class="w-full max-w-md h-full bg-white shadow-2xl relative flex flex-col overflow-y-auto">
        
        <!-- Header -->
        <div class="p-6 flex items-center justify-between border-b bg-white sticky top-0 z-10">
            <div>
                <h1 class="text-2xl font-bold text-sky-600">صفاء</h1>
                <p class="text-[10px] text-gray-400">نظام حماية بيئة طلاب الربو</p>
            </div>
            <div class="w-12 h-12 safaa-gradient rounded-2xl flex items-center justify-center text-white font-bold shadow-md">ص</div>
        </div>

        <div class="p-6 space-y-6 flex-grow">
            <!-- الحالة الرئيسية -->
            <div id="statusContainer" class="glass-card p-8 text-center border-2 border-green-200 transition-all duration-500">
                <p class="text-sm text-gray-500 mb-2">جودة الهواء الحالية</p>
                <div id="mainValue" class="text-6xl font-bold text-green-500 mb-4">98%</div>
                <div id="statusText" class="inline-block px-4 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">
                    البيئة مثالية للتركيز ✅
                </div>
            </div>

            <!-- المؤشرات الفرعية -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-4 border border-gray-100">
                    <span class="text-2xl">🌡️</span>
                    <h3 class="text-xs text-gray-400 mt-2">الحرارة</h3>
                    <p id="tempVal" class="text-xl font-bold text-gray-800">22°م</p>
                </div>
                <div class="glass-card p-4 border border-gray-100">
                    <span class="text-2xl">🧠</span>
                    <h3 class="text-xs text-gray-400 mt-2">مستوى التركيز</h3>
                    <p id="focusVal" class="text-xl font-bold text-sky-500">مرتفع</p>
                </div>
                <div class="glass-card p-4 border border-gray-100">
                    <span class="text-2xl">🌫️</span>
                    <h3 class="text-xs text-gray-400 mt-2">CO2</h3>
                    <p id="co2Val" class="text-xl font-bold text-gray-800">420 <span class="text-[10px] text-gray-400">ppm</span></p>
                </div>
                <div id="asthmaCard" class="glass-card p-4 border border-gray-100">
                    <span class="text-2xl">🫁</span>
                    <h3 class="text-xs text-gray-400 mt-2">حالة طلاب الربو</h3>
                    <p id="asthmaText" class="text-xl font-bold text-green-500">آمنة</p>
                </div>
            </div>

            <!-- ملاحظة المعلم -->
            <div class="space-y-2">
                <label class="text-sm font-bold text-gray-600 px-1">سجل ملاحظات الفصل:</label>
                <textarea id="teacherNote" class="w-full p-4 rounded-2xl border border-gray-200 focus:border-sky-400 focus:ring-1 focus:ring-sky-400 outline-none text-sm h-24" placeholder="اكتب حالة الطلاب أو أي ملاحظات هنا..."></textarea>
            </div>

            <!-- أزرار التحكم -->
            <div class="grid grid-cols-2 gap-4 pb-10">
                <button onclick="simulateTest()" class="py-4 safaa-gradient text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">
                    فحص جديد
                </button>
                <button onclick="saveToArchive()" class="py-4 bg-gray-800 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">
                    أرشفة النتيجة
                </button>
            </div>
        </div>

        <!-- شريط التبديل السفلي -->
        <div class="bg-white border-t p-4 flex justify-around sticky bottom-0">
            <button class="text-sky-600 font-bold flex flex-col items-center">
                <span class="text-xl">🏠</span>
                <span class="text-[10px]">الرئيسية</span>
            </button>
            <button onclick="showArchive()" class="text-gray-400 flex flex-col items-center">
                <span class="text-xl">📁</span>
                <span class="text-[10px]">الأرشيف</span>
            </button>
        </div>
    </div>

    <script>
        // دالة المحاكاة (الاختبار)
        function simulateTest() {
            const btn = event.target;
            btn.innerText = "جاري الفحص...";
            btn.disabled = true;

            setTimeout(() => {
                const scenarios = [
                    { quality: 98, temp: 22, co2: 420, focus: "مرتفع", asthma: "آمنة", color: "green", msg: "البيئة مثالية للتركيز ✅" },
                    { quality: 65, temp: 26, co2: 850, focus: "متوسط", asthma: "مراقبة", color: "yellow", msg: "يرجى فتح النوافذ قريباً ⚠️" },
                    { quality: 32, temp: 30, co2: 1250, focus: "منخفض جداً", asthma: "خطر 🚨", color: "red", msg: "خطر! تهوية فورية مطلوبة" }
                ];
                
                const random = scenarios[Math.floor(Math.random() * scenarios.length)];
                updateUI(random);
                btn.innerText = "فحص جديد";
                btn.disabled = false;
            }, 1500);
        }

        function updateUI(data) {
            const container = document.getElementById('statusContainer');
            const mainVal = document.getElementById('mainValue');
            const statusText = document.getElementById('statusText');
            const co2Val = document.getElementById('co2Val');
            const asthmaText = document.getElementById('asthmaText');
            
            mainVal.innerText = data.quality + "%";
            document.getElementById('tempVal').innerText = data.temp + "°م";
            document.getElementById('focusVal').innerText = data.focus;
            co2Val.innerHTML = data.co2 + ' <span class="text-[10px] text-gray-400">ppm</span>';
            asthmaText.innerText = data.asthma;

            // تغيير الألوان بناءً على الحالة
            if(data.color === 'red') {
                container.className = "glass-card p-8 text-center border-4 border-red-500 emergency-pulse";
                mainVal.className = "text-6xl font-bold text-red-500 mb-4";
                statusText.className = "inline-block px-4 py-1 bg-red-100 text-red-700 rounded-full text-sm font-medium";
                asthmaText.className = "text-xl font-bold text-red-500";
            } else if(data.color === 'yellow') {
                container.className = "glass-card p-8 text-center border-4 border-yellow-400";
                mainVal.className = "text-6xl font-bold text-yellow-500 mb-4";
                statusText.className = "inline-block px-4 py-1 bg-yellow-100 text-yellow-700 rounded-full text-sm font-medium";
                asthmaText.className = "text-xl font-bold text-yellow-500";
            } else {
                container.className = "glass-card p-8 text-center border-2 border-green-200";
                mainVal.className = "text-6xl font-bold text-green-500 mb-4";
                statusText.className = "inline-block px-4 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium";
                asthmaText.className = "text-xl font-bold text-green-500";
            }
            statusText.innerText = data.msg;
        }

        function saveToArchive() {
            const note = document.getElementById('teacherNote').value;
            const data = {
                date: new Date().toLocaleDateString('ar-EG'),
                quality: document.getElementById('mainValue').innerText,
                note: note || "لا توجد ملاحظات"
            };
            
            let archive = JSON.parse(localStorage.getItem('safaa_archive') || '[]');
            archive.unshift(data);
            localStorage.setItem('safaa_archive', JSON.stringify(archive));
            alert("تمت أرشفة البيانات بنجاح!");
            document.getElementById('teacherNote').value = "";
        }

        function showArchive() {
            const archive = JSON.parse(localStorage.getItem('safaa_archive') || '[]');
            if(archive.length === 0) {
                alert("الأرشيف فارغ حالياً.");
                return;
            }
            let list = "آخر التسجيلات:\n";
            archive.slice(0, 5).forEach(item => {
                list += `- ${item.date}: جودة ${item.quality} (${item.note})\n`;
            });
            alert(list);
        }
    </script>
</body>
</html>
